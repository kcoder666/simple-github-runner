name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: custom-github-runner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify runner binary
        run: |
          docker run --rm --entrypoint ./bin/Runner.Listener custom-github-runner:ci --version
